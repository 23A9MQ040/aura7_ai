name: AURA CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
    - uses: actions/checkout@v3
    - name: Use Node.js 20.x
      uses: actions/setup-node@v3
      with:
        node-version: 20.x
        cache: 'npm'
        cache-dependency-path: './frontend/package-lock.json'
    - run: npm install
    - run: npm run build
    - run: npm run lint

  build-backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [
          'aura-api-gateway', 'aura-auth-service', 'aura-user-service',
          'aura-agent-core', 'aura-memory-service', 'aura-learning-agent',
          'aura-career-agent', 'aura-privacy-service', 'aura-notification-service'
        ]
    defaults:
      run:
        working-directory: ./backend/${{ matrix.service }}
    steps:
    - uses: actions/checkout@v3
    - name: Set up JDK 20
      uses: actions/setup-java@v3
      with:
        java-version: '20'
        distribution: 'temurin'
        cache: maven
    - name: Build with Maven
      run: mvn -B package --file pom.xml
