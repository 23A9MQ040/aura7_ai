server:
  port: 8082

spring:
  application:
    name: aura-user-service
  datasource:
    # Use environment variables injected by Kubernetes configmap/secrets, with fallbacks for local dev
    url: ${DB_URL:jdbc:postgresql://localhost:5432/aura_db}
    username: ${DB_USER:aura}
    password: ${DB_PASSWORD:password}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true
