apiVersion: apps/v1
kind: Deployment
metadata:
  name: aura-api-gateway
  namespace: aura
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aura-api-gateway
  template:
    metadata:
      labels:
        app: aura-api-gateway
    spec:
      containers:
      - name: api-gateway
        image: your-registry/aura-api-gateway:latest # REPLACE with your actual registry
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: aura-config
        - secretRef:
            name: aura-secrets
