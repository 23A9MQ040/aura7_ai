apiVersion: apps/v1
kind: Deployment
metadata:
  name: aura-agent-core
  namespace: aura
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aura-agent-core
  template:
    metadata:
      labels:
        app: aura-agent-core
    spec:
      containers:
      - name: agent-core
        image: your-registry/aura-agent-core:latest # REPLACE with your actual registry
        imagePullPolicy: Always
        ports:
        - containerPort: 8083
        envFrom:
        - configMapRef:
            name: aura-config
        - secretRef:
            name: aura-secrets
        env:
        - name: DB_URL
          value: "jdbc:postgresql://aura-postgres:5432/aura_db"
