apiVersion: apps/v1
kind: Deployment
metadata:
  name: aura-web
  namespace: aura
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aura-web
  template:
    metadata:
      labels:
        app: aura-web
    spec:
      containers:
      - name: web
        image: your-registry/aura-web:latest # REPLACE with your actual registry
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
